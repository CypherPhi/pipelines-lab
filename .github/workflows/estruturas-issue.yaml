name: Issue Trigger Workflow

# Permissoes para permitir comentarios automaticos
permissions:
  issues: write

on:
  issues:
    types: [opened, edited, closed, labeled]
  
jobs:
  issue-job:
    runs-on: ubuntu-latest

    steps:
    - name: Informar sobre a issue
      run: |
        echo "Workflow disparado por ISSUE"
        echo "Ação: ${{ github.event.action }}"
        echo "Issue number: ${{ github.event.issue.number }}"
        echo "Issue title: ${{ github.event.issue.title }}"
        echo "Autor da issue: ${{ github.event.issue.user.login }}"
        echo "Labels: ${{ github.event.issue.labels }}"
    
    - name: Resposta automatica
      if: github.event.action == 'opened'
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createCommnet({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: 'Obrigado por reportar esta Issue'
          })
      