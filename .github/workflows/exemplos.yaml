name: Hello GitHub Actions

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  hello-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkou codigo
        uses: actions/checkout@v4

      - name: Executar Hello World
          run: echo "Hello, GitHub Actions!"

      - name: Exibir informações do sistema
        run: |
          echo "Sistema operacional: ${{ runner.os }}"
          echo "Diretorio Atual: ${{pwd}}"
          echo "Data Atual: ${{date}}"
          echo "Usuario: ${{whoami}}"
      
      - name: Listar arquivos do repositório
          run: ls -la
      
      - name: Comandos multiplos
        run: |
          echo "Este é o Lab 01 do curso de GitHub Actions"
          echo "Workflow executado com sucesso!"
          echo "Pronto para o próximo passo!"
