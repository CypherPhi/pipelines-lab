name: Push Trigger Workflow

# Executa apenas em push
on:
  push:
    branches:
      - main
      - develop
    paths:
      #Criar esses arquivos para funcionar
      - 'src/**'
      - 'README.md'

jobs:
  push-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Informaçoes do Push
        run: |
          echo "Workflow disparado por um push!"
          echo "Branch: ${{ github.ref }}"
          echo "Commit Message: ${{ github.event.head_commit.message }}"
          echo "Pushed by: ${{ github.actor }}"
          echo "Repository: ${{ github.repository }}"

      - name: Listar arquivos modificados
        run: |
          echo "Arquivos modificados"
          ls -la
