name: Estrategia Matrix

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # job com matrix para multiplos ambientes
  test-matrix:
    runs-on: ${{ matrix.os }}
  
    strategy:
      fail-fast: false # Não para se um job falhar
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [16, 18, 20]
        include:
        # Configurações especificas
          - os: ubuntu-latest
            node-version: 20
            experimental: true
        exclude:
        # Excluir combinações problematicas
          - os: windows-latest
            node-version: 16
    
    steps:
    - name: Checkout codigo
      uses: actions/checkout@v4

    - name: Informações da matrix
      run: |
        echo "OS: ${{ matrix.os }}"
        echo "Node: ${{ matrix.node-version }}"
        echo "Experimental: ${{ matrix.experimental }}"

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    
    - name: Verificar versoes
      run: |
        echo "Node version: $(node --version)"
        echo "NPM version: $(npm --version)"

    - name: Executar testes especificos do OS
      run: |
        echo "Executando testes no ${{ matrix.os }} com Node ${{ matrix.node-version }}..."
        sleep 2
        echo "Testes concluidos"

    - name: Testes Experimental
      if: matrix.experimental == true
      run: |
        echo "Executando testes experimentais..."
        sleep 1
        echo "Testes experimentais concluidos"

  collect-results:
    runs-on: ubuntu-latest
    needs: test-matrix

    steps:
    - name: Coletar Resultado
      run: |
        echo "Coletando resultados de todos os jobs da matrix..."
        echo "Todos os testes da matrix foram executados"
        