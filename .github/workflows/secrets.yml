name: GitHub Secrets

on:
    push:
        branches: [main]
    workflow_dispatch:

jobs:
    demostrar-secrets:
        runs-on: ubuntu-latest

        steps:
            - name: Fazer checkout do repositorio
              uses: actions/checkout@v4
            
            - name: Configurar credenciais da API
              env:
                API_KEY: ${{ secrets.API_KEY }}
                API_URL: ${{ secrets.API_URL }}
              run: |
                echo "Configurando conexão com API externa..."
                echo "URL da API: $API_URL"
                echo "API Key esta configurada: ${API_KEY:+SIM}"

            - name: Conectar ao banco de dados
              env:
                DB_HOST: ${{ secrets.DB_HOST }}
                DB_USERNAME: ${{ secrets.DB_USER }}
                DB_PASSWORD: ${{ secrets.DB_PASS }}
                DB_PORT: ${{ secrets.DB_PORT }}
              run: |
                echo "Configurando conexão com o BD"
                echo "HOST: $DB_HOST"
                echo "Porta: $DB_PORT"
                echo "Usuario: $DB_USERNAME"
                echo "Senha: $DB_PASSWORD"
                echo "Observe que a senha sera mascarada nos logs"

            - name: Preparar Deploy com Token
              env:
                TOKEN: ${{ secrets.TOKEN }}
              run: |
                echo "Preparando deploy..."
                echo "Token de deploy: $TOKEN"
            
            - name: Verificar segurança dos secrets
              run: |
                echo "Secrets são substituidos por *****"
                echo "Secrets não são acessiveis fora do repositorio"